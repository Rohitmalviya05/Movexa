services:
  - type: web
    name: movexa-app
    env: node
    plan: free
    rootDir: .
    buildCommand: npm run render-build
    startCommand: npm run render-start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: VITE_API_URL
        value: /api/v1
